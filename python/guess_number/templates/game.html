<!DOCTYPE html>
<html>
<head>
  <title>Number Guessing Game</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .box {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      width: 400px;
      text-align: center;
      color: white;
    }
    input { padding: 12px; width: 75%; border-radius: 8px; border: none; text-align: center; margin-bottom: 10px; }
    button { padding: 12px; width: 100%; border: none; border-radius: 8px; margin-bottom: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    button:hover { transform: scale(1.05); }
    #startBtn { background: #00c9a7; color: white; }
    #guessBtn { background: #ff7a18; color: white; }
    #message { margin-top: 10px; padding: 10px; border-radius: 8px; font-weight: bold; }
    .low { background: rgba(0,150,255,0.2); }
    .high { background: rgba(255,50,50,0.2); }
    .win { background: rgba(0,255,150,0.3); }
    .error { background: rgba(255,200,0,0.3); }
    #attempts { margin-top: 10px; font-weight: bold; }
    #historyBox { margin-top: 15px; text-align: left; height: 240px; overflow-y: auto; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; }
    #historyList { list-style: none; padding: 0; }
    #historyList li { margin: 6px 0; padding: 8px; border-radius: 6px; background: rgba(255,255,255,0.2); font-size: 15px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🎯 Guess the Number (1-50)</h2>
    <button id="startBtn" onclick="startGame()">Start Game</button>
    <input type="number" id="guessInput" placeholder="Enter 1-50" disabled>
    <button id="guessBtn" onclick="makeGuess()" disabled>Guess</button>
    <p id="attempts">Attempts: 0</p>
    <div id="message"></div>
    <div id="historyBox">
      <b>👉 Your Guesses</b>
      <ul id="historyList"></ul>
    </div>
  </div>

  <script>
    async function startGame() {
      const res = await fetch("/start");
      const data = await res.json();
      document.getElementById("guessInput").disabled = false;
      document.getElementById("guessBtn").disabled = false;
      document.getElementById("attempts").innerText = "Attempts: 0";
      document.getElementById("historyList").innerHTML = "";
      showMessage(data.message, "low");
    }

    async function makeGuess() {
      const num = document.getElementById("guessInput").value;
      if (!num) {
        showMessage("Enter a number!", "error");
        return;
      }
      const res = await fetch("/guess/" + num);
      const data = await res.json();
      showMessage(data.message, data.result);
      document.getElementById("attempts").innerText = "Attempts: " + data.attempts;
      const list = document.getElementById("historyList");
      const li = document.createElement("li");
      li.innerText = "Your guess: " + num;
      list.appendChild(li);
      if (data.result === "win") {
        document.getElementById("guessInput").disabled = true;
        document.getElementById("guessBtn").disabled = true;
        setTimeout(() => { window.location.href = "/thankyou"; }, 1500);
      }
      document.getElementById("guessInput").value = "";
    }

    function showMessage(text, type) {
      const msg = document.getElementById("message");
      msg.innerText = text;
      msg.className = type;
    }
  </script>
</body>
</html>
