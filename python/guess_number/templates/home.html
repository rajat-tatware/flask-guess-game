<!DOCTYPE html>
<html>
<head>
  <title>Number Guessing Game</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1d2671, #c33764);
      color: white;
      text-align: center;
    }
    h1 { font-size: 55px; letter-spacing: 3px; }
    p { font-size: 18px; margin-top: 20px; line-height: 1.6; }
    button {
      margin-top: 30px;
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #00c9a7;
      color: white;
    }
  </style>
</head>
<body>
  <div>
    <h1>🎯 NUMBER GUESSING GAME</h1>
    <h3>📜 How to Play:</h3>
    <p>
      1. Click Start Game<br>
      2. Guess number between 1-50<br>
      3. Get hints (Too High / Too Low)<br>
      4. Win in minimum attempts 😎
    </p>
    <button onclick="window.location.href='/game'">Start Game</button>
  </div>
</body>
</html>
